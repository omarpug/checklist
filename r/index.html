<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirect...</title>
  <meta name="robots" content="noindex">
</head>
<body>
  <p>Ti stiamo reindirizzando...</p>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const finalUrl = params.get("to");
      const logUrl = params.get("log");

      function goToFinalUrl() {
        if (finalUrl) {
          window.location.href = finalUrl;
        } else {
          document.body.innerHTML = "<p>Link non valido.</p>";
        }
      }

      if (logUrl) {
        try {
          const img = new Image();
          img.src = logUrl + "&_t=" + Date.now();
        } catch (e) {}

        setTimeout(goToFinalUrl, 500);
      } else {
        goToFinalUrl();
      }
    })();
  </script>
</body>
</html>
