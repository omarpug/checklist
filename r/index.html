<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reindirizzamento...</title>
</head>

<body style="font-family: Arial, sans-serif; text-align:center; padding:40px; color:#0a2540;">

  <p>Reindirizzamento in corso...</p>

  <p>
    <a id="fallback" href="#" style="color:#0a2540; font-weight:bold;">
      Clicca qui se non vieni reindirizzato
    </a>
  </p>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);

      const to = params.get("to");
      const log = params.get("log");

      if (!to) {
        document.body.innerHTML = "<p>Link non valido: destinazione mancante.</p>";
        return;
      }

      const fallback = document.getElementById("fallback");
      fallback.href = to;

      function addCacheBuster(url) {
        return url + (url.indexOf("?") > -1 ? "&" : "?") + "_ts=" + Date.now();
      }

      function fireLog() {
        if (!log) return;

        try {
          fetch(addCacheBuster(log), {
            method: "GET",
            mode: "no-cors",
            keepalive: true,
            cache: "no-store"
          }).catch(function () {});
        } catch (e) {}

        try {
          const img = new Image();
          img.src = addCacheBuster(log);
        } catch (e) {}

        try {
          const iframe = document.createElement("iframe");
          iframe.src = addCacheBuster(log);
          iframe.style.display = "none";
          iframe.width = "1";
          iframe.height = "1";
          document.body.appendChild(iframe);
        } catch (e) {}
      }

      fireLog();

      setTimeout(function () {
        window.location.replace(to);
      }, 900);
    })();
  </script>

</body>
</html>
