<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Reindirizzamento...</title>
</head>

<body style="font-family: Arial, sans-serif; text-align:center; padding:40px; color:#0a2540;">

  <p>Ti stiamo reindirizzando...</p>

  <p>
    <a id="fallback" href="#" style="color:#0a2540; font-weight:bold;">
      Clicca qui se non vieni reindirizzato
    </a>
  </p>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const finalUrl = params.get("to");
      const logUrl = params.get("log");

      function addCacheBuster(url) {
        if (!url) return "";
        return url + (url.indexOf("?") > -1 ? "&" : "?") + "_ts=" + Date.now();
      }

      function fireLog() {
        if (!logUrl) return;

        const trackedUrl = addCacheBuster(logUrl);

        try {
          fetch(trackedUrl, {
            method: "GET",
            mode: "no-cors",
            keepalive: true,
            cache: "no-store"
          }).catch(function () {});
        } catch (e) {}

        try {
          const img = new Image();
          img.src = trackedUrl;
        } catch (e) {}

        try {
          const iframe = document.createElement("iframe");
          iframe.src = trackedUrl;
          iframe.style.display = "none";
          iframe.width = "1";
          iframe.height = "1";
          document.body.appendChild(iframe);
        } catch (e) {}
      }

      function goToFinalUrl() {
        if (finalUrl) {
          window.location.replace(finalUrl);
        } else {
          document.body.innerHTML = "<p>Link non valido: destinazione mancante.</p>";
        }
      }

      if (!finalUrl) {
        document.body.innerHTML = "<p>Link non valido: destinazione mancante.</p>";
        return;
      }

      document.getElementById("fallback").href = finalUrl;

      fireLog();

      setTimeout(goToFinalUrl, 900);
    })();
  </script>

</body>
</html>
